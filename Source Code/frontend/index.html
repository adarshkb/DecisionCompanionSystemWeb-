<!DOCTYPE html>
<html>
<head>
<title>Decision Companion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Decision Companion System</h1>

<h2>Step 1: Define Decision Factors (in order of importance)</h2>
<input id="factorInput" placeholder="Enter Factor (eg: Salary)">
<button onclick="addFactor()">Add Factor</button>

<ul id="factorList"></ul>

<hr>

<h2>Step 2: Add Job</h2>

<input id="company" placeholder="Company Name">

<div id="ratings"></div>

<button onclick="addJob()">Add Job</button>

<hr>

<h2>Decision Matrix</h2>
<table border="1" id="matrix"></table>

<hr>

<button onclick="evaluateJobs()">Evaluate Best Job</button>

<h2>Results</h2>
<ol id="results"></ol>
<h2>Recommendation</h2>
<p id="recommendation"></p>

<script src="script.js"></script>
</body>
</html>
